services:
  api:
    build:
      context: .
      target: api
    container_name: cleerio-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      target: worker
    container_name: cleerio-worker
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: .
      target: dashboard
    container_name: cleerio-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3001}:3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional migrator service that runs and exits
  migrator:
    build:
      context: .
      target: migrator
    container_name: cleerio-migrator
    env_file: .env
    profiles:
      - tools
